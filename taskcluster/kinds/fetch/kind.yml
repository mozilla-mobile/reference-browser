---
loader: taskgraph.loader.transform:loader

transforms:
    - taskgraph.transforms.fetch:transforms
    - taskgraph.transforms.run:transforms
    - taskgraph.transforms.task:transforms

task-defaults:
    docker-image: {in-tree: base}

tasks:
    android-sdk:
        description: Android SDK
        fetch:
            type: static-url
            url: https://dl.google.com/android/repository/commandlinetools-linux-15641748_latest.zip
            artifact-name: sdk-tools-linux.zip
            sha256: a66d5ef0238fc0162e9c1446602ce0dd41702d4dd7a94d2ce42d12b7f80baf7e
            size: 174244366
        artifact-prefix: mobile/android-sdk
        fetch-alias: android-sdk
